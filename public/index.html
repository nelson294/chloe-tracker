<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find my Chloe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.app { min-height: 100vh; padding: 20px 16px 48px; transition: background 0.4s; position: relative; overflow: hidden; background: #e8f4ff; }
.sparkle-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 220px; pointer-events: none; overflow: hidden; }
.sp { position: absolute; border-radius: 50%; opacity: 0.25; background: #378ADD; }
.card { background: #fff; border-radius: 16px; border: 0.5px solid rgba(0,0,0,0.07); padding: 16px 18px; margin-bottom: 10px; position: relative; z-index: 1; }
.lbl { font-size: 11px; color: #999; margin-bottom: 2px; }
.val { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
.p-fly { background: #E6F1FB; color: #0C447C; }
.p-off { background: #f0f0ed; color: #666; }
.p-sby { background: #EEEDFE; color: #3C3489; }
.p-lay { background: #FAEEDA; color: #633806; }
.p-land { background: #EAF3DE; color: #27500A; }
.route-wrap { display: flex; align-items: center; gap: 8px; margin: 14px 0 6px; }
.apt-col { text-align: center; }
.apt-code { font-size: 26px; font-weight: 600; color: #1a1a1a; line-height: 1; }
.apt-city { font-size: 10px; color: #999; margin-top: 2px; }
.track { flex: 1; height: 1px; background: #ddd; position: relative; }
.track::after { content: ''; position: absolute; right: -1px; top: -3px; border-left: 5px solid #ddd; border-top: 3px solid transparent; border-bottom: 3px solid transparent; }
.plane-dot { width: 10px; height: 10px; border-radius: 50%; background: #378ADD; position: absolute; top: -4px; }
.prog-bg { background: #f0f0ed; border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 4px; }
.prog-fill { height: 4px; border-radius: 4px; background: #378ADD; }
.prog-row { display: flex; justify-content: space-between; font-size: 10px; color: #999; }
.eta-line { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-top: 10px; }
.hr { border: none; border-top: 0.5px solid #f0f0ed; margin: 12px 0; }
.footer-row { display: flex; justify-content: space-between; align-items: center; }
.foot-txt { font-size: 10px; color: #bbb; }
.rbtn { font-size: 11px; padding: 4px 10px; border-radius: 8px; border: 1px solid #e0e0e0; background: none; color: #666; cursor: pointer; }
.rbtn:hover { background: #f5f5f0; }
.toggle { display: flex; background: rgba(255,255,255,0.6); border-radius: 14px; padding: 4px; margin-bottom: 18px; position: relative; z-index: 1; border: 0.5px solid rgba(0,0,0,0.06); }
.tbtn { flex: 1; padding: 9px; font-size: 13px; font-weight: 500; border: none; background: none; border-radius: 11px; cursor: pointer; color: #aaa; transition: all 0.25s; }
.tbtn.on-nelson { background: linear-gradient(135deg, #cce8ff, #a8d4f8); color: #1a5fa8; box-shadow: 0 2px 8px rgba(56,138,221,0.2); }
.tbtn.on-chloe { background: linear-gradient(135deg, #ffd6e7, #ffb8d0); color: #b03060; box-shadow: 0 2px 8px rgba(210,80,130,0.2); }
.sec { font-size: 10px; font-weight: 500; color: #aaa; letter-spacing: 0.6px; text-transform: uppercase; margin: 20px 0 8px; position: relative; z-index: 1; }
.stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin-bottom: 10px; position: relative; z-index: 1; }
.stat-card { background: #fff; border-radius: 14px; padding: 14px; border: 0.5px solid rgba(0,0,0,0.07); }
.stat-val { font-size: 17px; font-weight: 500; color: #1a1a1a; margin-top: 4px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-hdr { text-align: center; font-size: 9px; color: #888; padding: 4px 0 3px; font-weight: 600; }
.cday { border-radius: 6px; padding: 4px; min-height: 56px; font-size: 9px; border: 1px solid transparent; }
.cday.empty { background: transparent; }
.cday.c-fly { background: #c8e2fa; border-color: #85B7EB; }
.cday.c-off { background: #d8d8d5; border-color: #b8b8b4; }
.cday.c-sby { background: #d4d0f5; border-color: #AFA9EC; }
.cday.c-lay { background: #f5dfa8; border-color: #EF9F27; }
.cday .dn { font-size: 9px; font-weight: 600; color: #444; }
.cday .dt { font-size: 8px; line-height: 1.3; margin-top: 2px; }
.c-fly .dn { color: #042C53; } .c-fly .dt { color: #0C447C; }
.c-sby .dn { color: #26215C; } .c-sby .dt { color: #3C3489; }
.c-lay .dn { color: #412402; } .c-lay .dt { color: #633806; }
.c-off .dn { color: #333; } .c-off .dt { color: #555; }
.legend-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; position: relative; z-index: 1; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #777; }
.legdot { width: 10px; height: 10px; border-radius: 3px; }
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.tag { font-size: 10px; color: #888; background: #f0f0ed; border-radius: 4px; padding: 2px 6px; }
.time-tiles { border-top: 0.5px solid #f0f0ed; margin-top: 12px; padding-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ttval { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-top: 3px; }
.ttsub { font-size: 10px; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>
<div class="app" id="app">
<div class="sparkle-wrap" id="sparkles"></div>

<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;position:relative;z-index:1;">
  <div>
    <div style="font-size:20px;font-weight:500;color:#1a1a1a;" id="pg-title">Find my Chloe ✦</div>
    <div style="font-size:12px;color:#aaa;margin-top:3px;" id="pg-date"></div>
  </div>
  <div id="live-dot" style="width:7px;height:7px;border-radius:50%;background:#ccc;margin-top:8px;"></div>
</div>

<div class="toggle">
  <button class="tbtn on-nelson" onclick="setView('nelson',this)">✦ Nelson</button>
  <button class="tbtn" onclick="setView('chloe',this)">✦ Chloe</button>
</div>

<div id="status-area" style="position:relative;z-index:1;"><div class="card"><div class="lbl">Loading...</div></div></div>
<div id="flight-hours-area" style="position:relative;z-index:1;"></div>
<div id="tomorrow-area" style="position:relative;z-index:1;"></div>
<div id="stat-grid-area" style="position:relative;z-index:1;"></div>
<div id="upcoming-area" style="position:relative;z-index:1;"></div>

<div class="sec">June 2026</div>
<div class="legend-row">
  <div class="leg"><div class="legdot" style="background:#c8e2fa;border:1px solid #85B7EB;"></div>Flying</div>
  <div class="leg"><div class="legdot" style="background:#f5dfa8;border:1px solid #EF9F27;"></div>Layover</div>
  <div class="leg"><div class="legdot" style="background:#d4d0f5;border:1px solid #AFA9EC;"></div>Standby</div>
  <div class="leg"><div class="legdot" style="background:#d8d8d5;border:1px solid #b8b8b4;"></div>Off</div>
</div>
<div class="card" style="padding:10px 8px;position:relative;z-index:1;">
  <div class="cal-grid" id="cal"></div>
</div>
</div>

<script>
const CITIES={TPE:'Taipei',LAX:'Los Angeles',DPS:'Bali',NRT:'Tokyo',KIX:'Osaka',CEB:'Cebu',CTS:'Sapporo',SIN:'Singapore',HKG:'Hong Kong',ICN:'Seoul',BKK:'Bangkok'};

const FLIGHTS={
  'BR255':{dep:'TPE',arr:'DPS'},'BR256':{dep:'DPS',arr:'TPE'},
  'BR198':{dep:'TPE',arr:'NRT'},'BR197':{dep:'NRT',arr:'TPE'},
  'BR132':{dep:'TPE',arr:'KIX'},'BR131':{dep:'KIX',arr:'TPE'},
  'BR12':{dep:'TPE',arr:'LAX',nextDay:true},'BR11':{dep:'LAX',arr:'TPE'},
  'BR16':{dep:'TPE',arr:'LAX',nextDay:true},'BR5':{dep:'LAX',arr:'TPE'},
  'BR281':{dep:'TPE',arr:'CEB'},'BR282':{dep:'CEB',arr:'TPE'},
  'BR116':{dep:'TPE',arr:'CTS'},'BR115':{dep:'CTS',arr:'TPE'},
  'BR215':{dep:'TPE',arr:'SIN'},'BR216':{dep:'SIN',arr:'TPE'},
};

const LAYOVERS={
  '2026-06-10':{dest:'LAX',returnFlight:'BR11',returnDate:'Jun 12'},
  '2026-06-11':{dest:'LAX',returnFlight:'BR11',returnDate:'Jun 12'},
  '2026-06-17':{dest:'LAX',returnFlight:'BR5',returnDate:'Jun 18-19'},
};

// SCHEDULE: [depH, depM, arrH, arrM, durationMins] all times HKT
// depH+depM + durationMins = arrH+arrM (verified). nextDay flights store arr in HKT too.
// Sources: cross-checked Airportia + Flightera + actual recent flights where available.
const SCHEDULE={
  'BR198':[9,0,12,25,205],    // TPE→NRT 3h25m (trip.com actual)
  'BR197':[13,25,17,5,220],   // NRT→TPE 3h40m (trip.com actual dep 14:25 JST arr 17:05)
  'BR132':[9,30,11,27,117],   // TPE→KIX 1h57m (Airportia avg)
  'BR131':[13,0,15,16,136],   // KIX→TPE 2h16m (Airportia avg)
  'BR12':[23,40,10,25,705],   // TPE→LAX 11h45m; arr 10:25 HKT +1day (19:25 PDT)
  'BR11':[15,15,4,45,810],    // LAX→TPE 13h30m (Airportia avg, your screenshot ~13h20m)
  'BR16':[23,40,10,10,690],   // TPE→LAX 11h30m; arr 10:10 HKT +1day (19:10 PDT)
  'BR5':[0,10,13,54,824],     // LAX→TPE 13h44m (Airportia avg)
  'BR281':[8,0,10,30,150],    // TPE→CEB 2h30m (distance-based, short haul)
  'BR282':[12,30,14,45,135],  // CEB→TPE 2h15m (distance-based, short haul)
  'BR116':[10,10,14,0,230],   // TPE→CTS 3h50m (Aviability scheduled)
  'BR115':[15,0,18,30,210],   // CTS→TPE 3h30m (distance-based)
  'BR215':[9,25,13,55,270],   // TPE→SIN 4h30m (trip.com actual)
  'BR216':[15,20,20,0,280],   // SIN→TPE 4h40m (Airpaz scheduled)
};

// June confirmed flights — BR5 counted once (Jun 18-19 = same continuous flight)
const JUNE_FLIGHT_MINS=(function(){
  const flights=['BR198','BR197','BR132','BR131','BR12','BR11','BR16','BR5','BR281','BR282','BR116','BR115','BR215','BR216'];
  return flights.reduce((s,f)=>s+(SCHEDULE[f]?SCHEDULE[f][4]:0),0);
})();

const ROSTER={
  '2026-06-01':{type:'off',label:'YK'},
  '2026-06-02':{type:'fly',flights:['BR198','BR197'],dest:'NRT',sameDay:true},
  '2026-06-03':{type:'standby',label:'LCS',time:'17:00-20:00'},
  '2026-06-04':{type:'off',label:'ADO'},
  '2026-06-05':{type:'standby',label:'LCS',time:'17:00-20:00'},
  '2026-06-06':{type:'standby',label:'SCS',time:'14:00-17:00'},
  '2026-06-07':{type:'fly',flights:['BR132','BR131'],dest:'KIX',sameDay:true},
  '2026-06-08':{type:'off',label:'ADO'},
  '2026-06-09':{type:'fly',flights:['BR12'],dest:'LAX',returnFlight:'BR11',returnDate:'Jun 12'},
  '2026-06-10':{type:'layover',label:'LAX'},
  '2026-06-11':{type:'layover',label:'LAX'},
  '2026-06-12':{type:'fly',flights:['BR11'],dest:'TPE'},
  '2026-06-13':{type:'off',label:'ADO'},
  '2026-06-14':{type:'off',label:'DO'},
  '2026-06-15':{type:'off',label:'DO'},
  '2026-06-16':{type:'fly',flights:['BR16'],dest:'LAX',returnFlight:'BR5',returnDate:'Jun 18-19'},
  '2026-06-17':{type:'layover',label:'LAX'},
  '2026-06-18':{type:'fly',flights:['BR5'],dest:'TPE'},
  '2026-06-19':{type:'fly',flights:['BR5'],dest:'TPE'},
  '2026-06-20':{type:'off',label:'ADO'},
  '2026-06-21':{type:'off',label:'DO'},
  '2026-06-22':{type:'fly',flights:['BR116'],dest:'CTS',returnFlight:'BR115',returnDate:'Jun 23'},
  '2026-06-23':{type:'fly',flights:['BR115'],dest:'TPE'},
  '2026-06-24':{type:'off',label:'DO'},
  '2026-06-25':{type:'off',label:'DO'},
  '2026-06-26':{type:'standby',label:'SCS',time:'06:45-09:45'},
  '2026-06-27':{type:'fly',flights:['BR281','BR282'],dest:'CEB',sameDay:true},
  '2026-06-28':{type:'fly',flights:['BR215'],dest:'SIN',returnFlight:'BR216',returnDate:'Jun 29'},
  '2026-06-29':{type:'fly',flights:['BR216'],dest:'TPE'},
  '2026-06-30':{type:'off',label:'ADO'},
};

const BASE='https://chloe-tracker.onrender.com';
let view='nelson', lastS=null;

function pad2(n){return String(n).padStart(2,'0');}
function hktNow(){return new Date(Date.now()+8*3600000);}
function todayKey(){return hktNow().toISOString().slice(0,10);}
function tomorrowKey(){return new Date(Date.now()+8*3600000+86400000).toISOString().slice(0,10);}
function fmtHKT(iso){return new Date(new Date(iso).getTime()+8*3600000).toISOString().slice(11,16);}
function friendlyDate(k){return new Date(k+'T12:00:00Z').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function daysUntil(k){return Math.round((new Date(k+'T00:00:00Z')-new Date(todayKey()+'T00:00:00Z'))/86400000);}
function city(iata){return CITIES[iata]||iata;}

// Get report time in minutes (HKT) for a given roster day
function getReportMins(day){
  if(!day) return null;
  if(day.type==='fly'&&day.flights&&day.flights[0]&&SCHEDULE[day.flights[0]]){
    const s=SCHEDULE[day.flights[0]];
    return ((s[0]*60+s[1])-120+1440)%1440;
  }
  if(day.type==='standby'&&day.time){
    const sp=day.time.split('-')[0].split(':');
    return ((parseInt(sp[0])*60+parseInt(sp[1]||0))-60+1440)%1440;
  }
  return null;
}

function getUpcoming(){
  const today=todayKey();
  const now=hktNow();
  const nowMins=now.getUTCHours()*60+now.getUTCMinutes();
  const todayDay=ROSTER[today];

  let nw=null, no=null;

  // Check if today still counts as upcoming work (before report time)
  if(todayDay&&(todayDay.type==='fly'||todayDay.type==='standby')){
    const reportMins=getReportMins(todayDay);
    if(reportMins!==null&&nowMins<reportMins) nw={date:today,day:todayDay};
  }
  if(todayDay&&todayDay.type==='off') no={date:today,day:todayDay};

  for(const k of Object.keys(ROSTER).sort()){
    if(k<=today) continue;
    const d=ROSTER[k];
    if(!nw&&(d.type==='fly'||d.type==='standby')) nw={date:k,day:d};
    if(!no&&d.type==='off') no={date:k,day:d};
    if(nw&&no) break;
  }
  return{nextWork:nw,nextOff:no};
}

function buildSparkles(v){
  const wrap=document.getElementById('sparkles');
  wrap.innerHTML='';
  const color=v==='nelson'?'#378ADD':'#e05585';
  [[80,10,20],[50,70,10],[35,85,60],[60,20,80],[25,50,40],[45,90,15],[30,35,70],[70,60,85],[20,15,50],[55,75,35]].forEach(([s,x,y])=>{
    const d=document.createElement('div');
    d.className='sp';
    d.style.cssText=`width:${s}px;height:${s}px;left:${x}%;top:${y}%;background:${color};`;
    wrap.appendChild(d);
  });
}

function setView(v,btn){
  view=v;
  document.querySelectorAll('.tbtn').forEach(b=>{b.classList.remove('on-nelson','on-chloe');});
  btn.classList.add(v==='nelson'?'on-nelson':'on-chloe');
  document.getElementById('app').style.background=v==='nelson'?'#e8f4ff':'#fff0f5';
  document.getElementById('pg-title').textContent=v==='nelson'?'Find my Chloe \u2726':'My schedule \u2726';
  buildSparkles(v);
  render(lastS);
}

function renderFlightHours(){
  const el=document.getElementById('flight-hours-area');
  if(view!=='chloe'){el.innerHTML='';return;}
  const h=Math.floor(JUNE_FLIGHT_MINS/60),m=JUNE_FLIGHT_MINS%60;
  el.innerHTML=`<div style="background:linear-gradient(135deg,#ffd6e7,#ffb8d0);border-radius:16px;padding:16px 18px;margin-bottom:10px;">
    <div style="font-size:11px;color:rgba(0,0,0,0.4);margin-bottom:4px;">Total flight hours this month</div>
    <div style="font-size:28px;font-weight:600;color:#7a1a3a;">${h}h ${m}m</div>
    <div style="font-size:11px;color:rgba(0,0,0,0.35);margin-top:3px;">Confirmed scheduled flights only</div>
  </div>`;
}

function renderTomorrow(){
  const el=document.getElementById('tomorrow-area');
  const k=tomorrowKey();
  const day=ROSTER[k];
  if(!day){el.innerHTML='';return;}
  const dateStr=new Date(k+'T12:00:00Z').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  let title='',detail='',badge='';
  if(day.type==='off'){
    badge=`<span class="pill p-off">Day off</span>`;
    title='Day off';
    detail=`<div style="font-size:12px;color:#888;margin-top:3px;">${view==='nelson'?'She is free tomorrow':'You are free tomorrow'}</div>`;
  } else if(day.type==='layover'){
    badge=`<span class="pill p-lay">Layover</span>`;
    title=city(day.label)+' layover';
    detail=`<div style="font-size:12px;color:#888;margin-top:3px;">${view==='nelson'?'She is on layover':'Layover day'}</div>`;
  } else if(day.type==='standby'){
    badge=`<span class="pill p-sby">Standby</span>`;
    title=`${day.label} Standby`;
    detail=`<div style="font-size:12px;color:#555;margin-top:3px;">${day.time} \u00b7 TPE</div>`;
  } else if(day.type==='fly'){
    const f=day.flights?day.flights[0]:'';
    const r=FLIGHTS[f]||{};
    badge=`<span class="pill p-fly">Flying</span>`;
    title=f;
    if(r.dep&&r.arr) detail=`<div style="font-size:12px;color:#555;margin-top:3px;">${city(r.dep)} \u2192 ${city(r.arr)}</div>`;
  }
  el.innerHTML=`<div class="sec">Tomorrow</div>
  <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div class="lbl">${dateStr}</div>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a;margin-top:4px;">${title}</div>
      ${detail}
    </div>
    ${badge}
  </div>`;
}

function renderStatGrid(){
  const{nextWork:nw,nextOff:no}=getUpcoming();
  if(!nw&&!no){document.getElementById('stat-grid-area').innerHTML='';return;}
  let h='<div class="stat-grid">';
  if(nw){
    const d=nw.day,days=daysUntil(nw.date),dL=days===0?'Today':days===1?'Tomorrow':`${days} days`;
    const dc=d.dest?city(d.dest):'',of=d.flights?d.flights[0]:'';
    const nd=new Date(nw.date+'T12:00:00Z');
    const ndStr=nd.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' \u00b7 '+nd.toLocaleDateString('en-GB',{weekday:'short'});
    h+=`<div class="stat-card"><div class="lbl">Next working day</div><div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;"><div class="stat-val">${dL}</div><div style="font-size:11px;font-weight:500;color:#888;">${ndStr}</div></div>${dc?`<div style="font-size:11px;color:#555;margin-top:5px;font-weight:500;">${of} \u2192 ${dc}</div>`:''}</div>`;
  }
  if(no){
    const days=daysUntil(no.date),dL=days===0?'Today':days===1?'Tomorrow':`${days} days`;
    const nd=new Date(no.date+'T12:00:00Z');
    const ndStr=nd.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' \u00b7 '+nd.toLocaleDateString('en-GB',{weekday:'short'});
    h+=`<div class="stat-card"><div class="lbl">Next day off</div><div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;"><div class="stat-val">${dL}</div><div style="font-size:11px;font-weight:500;color:#888;">${ndStr}</div></div><div style="font-size:11px;color:#555;margin-top:5px;font-weight:500;">Free day</div></div>`;
  }
  h+='</div>';
  document.getElementById('stat-grid-area').innerHTML=h;
}

function renderUpcoming(){
  const{nextWork:nw}=getUpcoming();
  if(!nw){document.getElementById('upcoming-area').innerHTML='';return;}
  const d=nw.day,days=daysUntil(nw.date);
  const dL=days===0?'Today':days===1?'Tomorrow':`In ${days} days`;
  const of=d.flights?d.flights[0]:'';
  const or=FLIGHTS[of]||{};
  const depC=or.dep?city(or.dep):'',arrC=or.arr?city(or.arr):'';
  const rl=depC&&arrC?`${depC} \u2192 ${arrC}`:'';
  const isLH=d.returnFlight&&!d.sameDay,isSD=d.sameDay;
  let det='';
  if(isLH) det=`<div class="tag-row"><span class="tag">${of} outbound</span><span class="tag">Returns ${d.returnFlight} \u00b7 ${d.returnDate}</span></div>`;
  else if(isSD&&d.flights&&d.flights.length>1) det=`<div class="tag-row"><span class="tag">${d.flights[0]} out \u00b7 ${d.flights[1]} back</span><span class="tag">Same-day</span></div>`;
  if(d.time) det+=`<div style="font-size:11px;color:#aaa;margin-top:6px;">${d.time}</div>`;

  // Report time
  let reportHTML='', landHTML='';
  if(d.type==='fly'&&of&&SCHEDULE[of]){
    const s=SCHEDULE[of];
    const rMins=((s[0]*60+s[1])-120+1440)%1440;
    reportHTML=`<div><div class="lbl">\u23f0 Report time</div><div class="ttval">${pad2(Math.floor(rMins/60))}:${pad2(rMins%60)}</div><div class="ttsub">2h before ${of} dep</div></div>`;
    // Land time: same-day → use last flight; long haul → use outbound
    const landFlight=isSD&&d.flights&&d.flights.length>1?d.flights[d.flights.length-1]:of;
    const ls=SCHEDULE[landFlight];
    if(ls){
      const lf=FLIGHTS[landFlight]||{};
      const ndLabel=lf.nextDay?' (+1 day)':'';
      landHTML=`<div><div class="lbl">\u2708\ufe0f ${isSD?'Returns':'Lands'}</div><div class="ttval">${pad2(ls[2])}:${pad2(ls[3])} HKT</div><div class="ttsub">${landFlight} \u2192 ${city(lf.arr||'')}${ndLabel}</div></div>`;
    }
  } else if(d.type==='standby'&&d.time){
    const parts=d.time.split('-');
    const sp=parts[0].split(':');
    const rMins=((parseInt(sp[0])*60+parseInt(sp[1]||0))-60+1440)%1440;
    reportHTML=`<div><div class="lbl">\u23f0 Report time</div><div class="ttval">${pad2(Math.floor(rMins/60))}:${pad2(rMins%60)}</div><div class="ttsub">1h before standby</div></div>`;
    if(parts[1]){
      const ep=parts[1].split(':');
      landHTML=`<div><div class="lbl">\ud83d\udd14 Released at</div><div class="ttval">${ep[0]}:${ep[1]||'00'}</div><div class="ttsub">Standby ends</div></div>`;
    }
  }

  const timeTiles=reportHTML||landHTML?`<div class="time-tiles">${reportHTML}${landHTML}</div>`:'';
  document.getElementById('upcoming-area').innerHTML=`<div class="sec">Coming up</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div style="flex:1;">
        <div class="lbl">${dL} \u00b7 ${friendlyDate(nw.date)}</div>
        <div style="font-size:16px;font-weight:500;color:#1a1a1a;margin-top:5px;">${d.flights?d.flights[0]:d.label}</div>
        ${rl?`<div style="font-size:13px;color:#555;margin-top:3px;">${rl}</div>`:''}
        ${det}
      </div>
      <span class="pill ${d.type==='standby'?'p-sby':'p-fly'}" style="margin-top:2px;margin-left:10px;">${d.type==='standby'?'Standby':'Flying'}</span>
    </div>
    ${timeTiles}
  </div>`;
}

function renderStatus(s){
  const el=document.getElementById('status-area'),dot=document.getElementById('live-dot');
  if(!s){el.innerHTML='<div class="card"><div class="lbl">No data</div></div>';return;}

  // Pre-work: before report time, don't show API data
  if(s.type==='pre-work'){
    dot.style.background='#ccc';
    const d=s.day,f=d.flights?d.flights[0]:'',r=FLIGHTS[f]||{};
    const rH=Math.floor(s.reportMins/60),rM=s.reportMins%60;
    const routeStr=r.dep&&r.arr?`${city(r.dep)} \u2192 ${city(r.arr)}`:'';
    const msg=view==='nelson'?`She reports at ${pad2(rH)}:${pad2(rM)} — off until then`:`Your report time is ${pad2(rH)}:${pad2(rM)}`;
    el.innerHTML=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="lbl">Today</div><span class="pill p-off">Not started</span>
      </div>
      <div class="val" style="font-size:16px;">${d.type==='fly'?f:(d.label+' Standby')}</div>
      ${routeStr?`<div style="font-size:13px;color:#555;margin-top:3px;">${routeStr}</div>`:''}
      ${d.time&&d.type==='standby'?`<div style="font-size:12px;color:#555;margin-top:3px;">${d.time}</div>`:''}
      <div style="font-size:12px;color:#888;margin-top:6px;">${msg}</div>
    </div>`;
    return;
  }

  if(s.type==='off'){dot.style.background='#ccc';el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div class="lbl">Today</div><span class="pill p-off">Day off</span></div><div class="val" style="font-size:16px;">${s.label||'Day off'}</div><div style="font-size:12px;color:#888;margin-top:4px;">${view==='nelson'?'She is in Taipei \u2014 free today':'You are off today \u2014 rest up'}</div></div>`;return;}
  if(s.type==='layover'){dot.style.background='#EF9F27';const li=LAYOVERS[todayKey()]||{},dc=city(s.label);el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div class="lbl">Today</div><span class="pill p-lay">Layover</span></div><div class="val" style="font-size:16px;">${dc}</div><div style="font-size:12px;color:#888;margin-top:4px;">${view==='nelson'?`She is on layover in ${dc}`:`Enjoying ${dc} \u2014 layover day`}</div>${li.returnFlight?`<div class="tag-row"><span class="tag">Returns ${li.returnFlight} \u00b7 ${li.returnDate}</span></div>`:''}</div>`;return;}
  if(s.type==='standby'){dot.style.background='#7F77DD';const ph=s.phase,pm=ph==='before'?`Standby starts at ${s.time.split('-')[0]}`:ph==='active'?`On standby \u00b7 released at ${s.time.split('-')[1]}`:'Standby ended \u2014 released',sm=view==='nelson'?(ph==='active'?'She may be called to a flight':ph==='before'?'She is free until standby':'She is free now'):(ph==='active'?'Stay near TPE \u2014 may be called':ph==='before'?'Free until standby starts':'You have been released');el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div class="lbl">Today</div><span class="pill ${ph==='released'?'p-off':'p-sby'}">${ph==='released'?'Released':'Standby'}</span></div><div class="val" style="font-size:16px;">${s.label} Standby \u00b7 ${s.time}</div><div style="font-size:12px;color:#888;margin-top:4px;">${pm}</div><div style="font-size:11px;color:#aaa;margin-top:2px;">${sm}</div></div>`;return;}
  if(s.type==='fly'&&s.autoSelected&&s.flightData){
    const f=s.flightData,st=f.flight_status,dep=f.departure||{},arr=f.arrival||{},dA=dep.iata||'?',aA=arr.iata||'?',t=new Date();
    if(st==='active'){dot.style.background='#378ADD';const pct=f.percent||0,em=f.etaMins||null;let el2='',eta='';if(dep.actual){const ms=Math.round((t-new Date(dep.actual))/60000);el2=`${Math.floor(ms/60)}h ${ms%60}m airborne`;}if(em&&em>0){const lh=new Date(Date.now()+em*60000+8*3600000);eta=`${Math.floor(em/60)}h ${em%60}m to landing \u00b7 ~${lh.toISOString().slice(11,16)} HKT`;}el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><div><div class="lbl">Flight</div><div style="font-size:22px;font-weight:500;color:#1a1a1a;margin-top:2px;">${s.flightNum}</div></div><span class="pill p-fly">In the air</span></div><div style="font-size:11px;color:#aaa;margin-bottom:2px;">EVA Air${f.aircraft?' \u00b7 '+f.aircraft.iata:''}</div><div class="route-wrap"><div class="apt-col"><div class="apt-code">${dA}</div><div class="apt-city">${city(dA)}</div></div><div class="track"><div class="plane-dot" style="left:calc(${pct}% - 5px)"></div></div><div class="apt-col"><div class="apt-code">${aA}</div><div class="apt-city">${city(aA)}</div></div></div><div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-row"><span>${el2}</span><span>${pct}% complete</span></div>${eta?`<div class="eta-line">${eta}</div>`:''}<div class="hr"></div><div class="footer-row"><span class="foot-txt">Updated ${fmtHKT(t.toISOString())} HKT</span><button class="rbtn" onclick="loadStatus()">Refresh</button></div></div>`;return;}
    if(st==='landed'){dot.style.background='#4CAF50';el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div class="lbl">Flight</div><span class="pill p-land">Landed</span></div><div style="font-size:20px;font-weight:500;color:#1a1a1a;">${s.flightNum}</div><div style="font-size:13px;color:#888;margin-top:4px;">${dA} \u2192 ${aA} \u00b7 ${city(dA)} \u2192 ${city(aA)}</div><div style="font-size:12px;color:#aaa;margin-top:4px;">${view==='nelson'?'She has landed. Flight complete.':'You have landed. Welcome back!'}</div><div class="hr"></div><div class="footer-row"><span class="foot-txt">Updated ${fmtHKT(t.toISOString())} HKT</span><button class="rbtn" onclick="loadStatus()">Refresh</button></div></div>`;return;}
    if(st==='scheduled'){dot.style.background='#ccc';const ds=dep.scheduled?new Date(dep.scheduled):null,mu=ds?Math.round((ds-t)/60000):null,cd=mu&&mu>0?`Departs in ${Math.floor(mu/60)}h ${mu%60}m`:'Departing soon';el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div class="lbl">Flight</div><span class="pill p-sby">Not departed</span></div><div style="font-size:20px;font-weight:500;color:#1a1a1a;">${s.flightNum}</div><div style="font-size:13px;color:#888;margin-top:4px;">${dA} \u2192 ${aA} \u00b7 ${city(dA)} \u2192 ${city(aA)}</div><div style="font-size:13px;font-weight:500;color:#1a1a1a;margin-top:6px;">${cd}</div>${ds?`<div style="font-size:11px;color:#aaa;margin-top:2px;">Scheduled ${fmtHKT(ds.toISOString())} HKT</div>`:''}</div>`;return;}
  }
  el.innerHTML='<div class="card"><div class="lbl">Today</div><div class="val" style="margin-top:4px;color:#aaa;">Loading...</div></div>';
}

function buildCal(){
  const days=['S','M','T','W','T','F','S'];
  let h=days.map(d=>`<div class="cal-hdr">${d}</div>`).join('');
  const fd=new Date('2026-06-01').getDay();
  for(let i=0;i<fd;i++)h+=`<div class="cday empty"></div>`;
  for(let d=1;d<=30;d++){
    const k=`2026-06-${String(d).padStart(2,'0')}`,day=ROSTER[k];
    let cls='cday',txt='';
    if(day){
      if(day.type==='fly'){cls+=' c-fly';const dc=day.dest?city(day.dest):'';if(day.sameDay&&day.flights&&day.flights.length>1){txt=`${day.flights[0]}<br>${day.flights[1]}<br>${dc}`;}else{txt=(day.flights?day.flights[0]:'')+(dc?`<br>${dc}`:'');if(day.returnFlight)txt+=`<br>\u21a9${day.returnFlight}`;}}
      else if(day.type==='layover'){cls+=' c-lay';txt=day.label?city(day.label):'';}
      else if(day.type==='standby'){cls+=' c-sby';txt=(day.label||'SBY')+(day.time?`<br>${day.time.split('-')[0]}`:'');}
      else{cls+=' c-off';txt=day.label||'';}
    }else{cls+=' c-off';}
    h+=`<div class="${cls}"><div class="dn">${d}</div><div class="dt">${txt}</div></div>`;
  }
  document.getElementById('cal').innerHTML=h;
}

function render(s){renderStatus(s);renderFlightHours();renderTomorrow();renderStatGrid();renderUpcoming();}

async function loadStatus(){
  const today=todayKey();
  const todayDay=ROSTER[today];
  const now=hktNow();
  const nowMins=now.getUTCHours()*60+now.getUTCMinutes();

  // Before report time: skip API, show pre-work status from roster
  if(todayDay&&(todayDay.type==='fly'||todayDay.type==='standby')){
    const reportMins=getReportMins(todayDay);
    if(reportMins!==null&&nowMins<reportMins){
      lastS={type:'pre-work',day:todayDay,reportMins};
      document.getElementById('live-dot').style.background='#ccc';
      render(lastS);
      return;
    }
  }

  try{
    const r=await fetch(`${BASE}/status`);
    lastS=await r.json();
    document.getElementById('live-dot').style.background='#4CAF50';
    render(lastS);
  }catch(e){
    document.getElementById('live-dot').style.background='#E24B4A';
    document.getElementById('status-area').innerHTML=`<div class="card"><div style="font-size:13px;color:#888;">Server waking up \u2014 wait 30s</div><button class="rbtn" style="margin-top:10px;" onclick="loadStatus()">Retry</button></div>`;
  }
}

document.getElementById('pg-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
buildSparkles('nelson');
buildCal();
loadStatus();
</script>
